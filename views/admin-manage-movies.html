<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Movies - Watchly Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="min-h-screen bg-background">
        <nav class="navbar">
            <div class="navbar-content">
                <a href="admin-dashboard.html" class="navbar-brand">
                    <img src="Watchly logo.png" alt="Watchly logo" class="navbar-logo" style="width: 24px; height: 24px; object-fit: contain;">
                    <span class="gradient-text">Watchly Admin</span>
                </a>
                <div class="navbar-nav">
                    <a href="admin-dashboard.html" class="nav-link">
                        <span class="hidden lg:inline">Dashboard</span>
                    </a>
                    <a href="admin-manage-movies.html" class="nav-link active">
                        <span class="hidden lg:inline">Manage Movies</span>
                    </a>
                    <a href="admin-manage-genres.html" class="nav-link">
                        <span class="hidden lg:inline">Manage Genres</span>
                    </a>
                    <a href="admin-manage-users.html" class="nav-link">
                        <span class="hidden lg:inline">Manage Users</span>
                    </a>
                    <a href="admin-manage-posts.html" class="nav-link">
                        <span class="hidden lg:inline">Moderate Posts</span>
                    </a>
                    <a href="admin-audit-log.html" class="nav-link">
                        <span class="hidden lg:inline">Audit Trail</span>
                    </a>
                </div>
                <div class="navbar-actions">
                    <a href="admin-dashboard.html" class="nav-link nav-link-compact">Admin Home</a>
                    <a href="#" class="btn btn-primary btn-sm" id="logout-btn">Logout</a>
                </div>
            </div>
        </nav>

        <main class="container mx-auto px-4 py-8">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h1 class="text-3xl font-bold mb-2">Manage Movies</h1>
                    <p class="text-muted-foreground">Add, edit, and delete movies from the catalog</p>
                </div>
                <button class="btn btn-primary" id="add-movie-btn">Add New Movie</button>
            </div>

            <!-- Add/Edit Movie Modal -->
            <div id="movie-modal" class="modal" style="display: none;">
                <div class="modal-overlay" onclick="closeModal()"></div>
                <div class="modal-content card">
                    <div class="card-content">
                        <h2 class="text-2xl font-bold mb-4" id="modal-title">Add Movie</h2>
                        <form id="movie-form">
                            <input type="hidden" id="movie-id">
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">Title *</label>
                                <input type="text" id="movie-title" class="form-input" required>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">Release Year *</label>
                                <input type="number" id="movie-year" class="form-input" min="1800" max="2100" required>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">Synopsis</label>
                                <textarea id="movie-synopsis" class="form-input" rows="4"></textarea>
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">Poster Image URL</label>
                                <input type="text" id="movie-poster" class="form-input">
                            </div>
                            <div class="mb-4">
                                <label class="block text-sm font-medium mb-2">Genres</label>
                                <select id="movie-genres" class="form-input" multiple style="height: 120px;">
                                    <!-- Will be populated dynamically -->
                                </select>
                                <p class="text-xs text-muted-foreground mt-1">Hold Ctrl/Cmd to select multiple</p>
                            </div>
                            <div class="flex gap-4">
                                <button type="submit" class="btn btn-primary">Save Movie</button>
                                <button type="button" class="btn btn-outline-secondary" onclick="closeModal()">Cancel</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-content">
                    <div class="overflow-x-auto">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Year</th>
                                    <th>Genres</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="movies-table-body">
                                <tr><td colspan="5" class="text-center text-muted-foreground">Loading movies...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <style>
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { position: relative; z-index: 1001; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
    </style>

    <script src="api.js"></script>
    <script>
        let allGenres = [];
        let editingMovieId = null;

        async function loadMovies() {
            try {
                const movies = await Admin.getMovies();
                const tbody = document.getElementById('movies-table-body');
                
                if (movies.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted-foreground">No movies found</td></tr>';
                    return;
                }
                
                tbody.innerHTML = movies.map(movie => `
                    <tr>
                        <td>${movie.movie_id}</td>
                        <td>${movie.title}</td>
                        <td>${movie.release_year}</td>
                        <td>${movie.genres ? movie.genres.split(',').map(g => g.trim()).join(', ') : 'N/A'}</td>
                        <td>
                            <button class="btn btn-outline-primary btn-sm" onclick="editMovie(${movie.movie_id})">Edit</button>
                            <button class="btn btn-outline-destructive btn-sm" onclick="deleteMovie(${movie.movie_id}, '${movie.title.replace(/'/g, "\\'")}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading movies:', error);
                alert('Failed to load movies');
            }
        }

        async function loadGenres() {
            try {
                allGenres = await Admin.getGenres();
                const select = document.getElementById('movie-genres');
                select.innerHTML = allGenres.map(g => `<option value="${g.genre_id}">${g.name}</option>`).join('');
            } catch (error) {
                console.error('Error loading genres:', error);
            }
        }

        function openModal(movieId = null) {
            editingMovieId = movieId;
            const modal = document.getElementById('movie-modal');
            const form = document.getElementById('movie-form');
            
            if (movieId) {
                document.getElementById('modal-title').textContent = 'Edit Movie';
                // Load movie data
                Admin.getMovies().then(movies => {
                    const movie = movies.find(m => m.movie_id === movieId);
                    if (movie) {
                        document.getElementById('movie-id').value = movie.movie_id;
                        document.getElementById('movie-title').value = movie.title;
                        document.getElementById('movie-year').value = movie.release_year;
                        document.getElementById('movie-synopsis').value = movie.synopsis || '';
                        document.getElementById('movie-poster').value = movie.poster_image || '';
                    }
                });
            } else {
                document.getElementById('modal-title').textContent = 'Add Movie';
                form.reset();
                document.getElementById('movie-id').value = '';
            }
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('movie-modal').style.display = 'none';
            document.getElementById('movie-form').reset();
            editingMovieId = null;
        }

        async function saveMovie(e) {
            e.preventDefault();
            
            const movieId = document.getElementById('movie-id').value;
            const title = document.getElementById('movie-title').value;
            const year = document.getElementById('movie-year').value;
            const synopsis = document.getElementById('movie-synopsis').value;
            const poster = document.getElementById('movie-poster').value;
            const genreSelect = document.getElementById('movie-genres');
            const genres = Array.from(genreSelect.selectedOptions).map(opt => parseInt(opt.value));
            
            const movieData = {
                title,
                release_year: parseInt(year),
                synopsis,
                poster_image: poster,
                genres
            };
            
            try {
                if (movieId) {
                    await Admin.updateMovie(parseInt(movieId), movieData.title, movieData.synopsis, movieData.release_year, movieData.poster_image);
                    alert('Movie updated successfully!');
                } else {
                    await Admin.addMovie(movieData.title, movieData.synopsis, movieData.release_year, movieData.poster_image, movieData.genres);
                    alert('Movie added successfully!');
                }
                closeModal();
                loadMovies();
            } catch (error) {
                alert(error.message || 'Failed to save movie');
            }
        }

        function editMovie(movieId) {
            openModal(movieId);
        }

        async function deleteMovie(movieId, title) {
            if (!confirm(`Are you sure you want to delete "${title}"?`)) return;
            
            try {
                await Admin.deleteMovie(movieId);
                alert('Movie deleted successfully!');
                loadMovies();
            } catch (error) {
                alert(error.message || 'Failed to delete movie');
            }
        }

        async function handleLogout() {
            try { await Auth.logout(); } catch (e) {}
            window.location.href = 'admin-login.html';
        }

        async function init() {
            try {
                const session = await Auth.checkSession();
                if (!session.authenticated || session.user.type !== 'admin') {
                    window.location.href = 'admin-login.html';
                    return;
                }
                await Promise.all([loadMovies(), loadGenres()]);
            } catch (error) {
                window.location.href = 'admin-login.html';
            }
        }

        document.getElementById('add-movie-btn').addEventListener('click', () => openModal());
        document.getElementById('movie-form').addEventListener('submit', saveMovie);
        document.getElementById('logout-btn').addEventListener('click', (e) => { e.preventDefault(); handleLogout(); });
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
